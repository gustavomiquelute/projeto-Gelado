<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Gelado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css"> 
</head>

<body class="bg-dark text-info">

    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-12 col-md-6 col-lg-4">

                <div class="card shadow-lg border-2 border-info bg-black">
                    <div class="card-body p-4">

                        <h1 id="titulo" class="text-center mb-4 text-info fw-bold">
                            Login
                        </h1>

                        <form>
                            <div class="mb-3">
                                <label class="form-label text-info">E-mail</label>
                                <input id="inputEmail" type="email" class="form-control bg-dark text-info border-info"
                                    placeholder="Digite seu e-mail" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-info">Senha</label>
                                <input id="inputSenha" type="password" class="form-control bg-dark text-info border-info"
                                    placeholder="Digite sua senha" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-info text-black fw-bold">
                                    Entrar
                                </button>
                            </div>
                        </form>

                        <p id="toggleText" class="text-center mt-3 mb-0 text-info">
                            Não tem conta? 
                            <a href="#" id="toggleLink" class="text-info fw-semibold">Criar conta</a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
<script src="/scripts/login.js"></script>
</html>
